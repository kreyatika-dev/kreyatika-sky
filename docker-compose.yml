services:
  kreyatika-sky:
    build: .
    image: kreyatika-sky:latest
    ports:
      - "80:5000"
    environment:
      - DB_PATH=/app/data/analytics.db
    volumes:
      - ./data:/app/data        # persists SQLite database across restarts
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
